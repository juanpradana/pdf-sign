<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta http-equiv="X-Content-Type-Options" content="nosniff">
  <meta http-equiv="X-Frame-Options" content="DENY">
  <meta name="referrer" content="strict-origin-when-cross-origin">
  
  <meta name="description" content="Aplikasi tanda tangan PDF yang aman, cepat, dan offline-ready">
  <meta name="theme-color" content="#1a73e8">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  
  <title>PDF Sign - Tanda Tangan Digital</title>
  
  <link rel="icon" type="image/svg+xml" href="/icons/icon-192.svg">
  <link rel="apple-touch-icon" href="/icons/icon-192.svg">
  
  <link rel="stylesheet" href="/src/css/styles.css">
</head>
<body>
  <div id="app">
    <!-- Header -->
    <header class="app-header">
      <div class="header-content">
        <h1 class="app-title">
          <svg class="logo-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
            <polyline points="14 2 14 8 20 8"/>
            <path d="M9 15l2 2 4-4"/>
          </svg>
          PDF Sign
        </h1>
        <p class="app-subtitle">Tanda tangan digital yang aman</p>
      </div>
    </header>

    <!-- Main Content -->
    <main class="main-content">
      <!-- Step 1: Upload PDF -->
      <section id="step-upload" class="step active">
        <div class="upload-area" id="dropZone" role="button" tabindex="0" aria-label="Upload file PDF">
          <div class="upload-icon">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
              <polyline points="17 8 12 3 7 8"/>
              <line x1="12" y1="3" x2="12" y2="15"/>
            </svg>
          </div>
          <p class="upload-text">Tap atau drag file PDF di sini</p>
          <p class="upload-hint">Maksimal 20MB • Hanya file .pdf</p>
          <input type="file" id="fileInput" accept=".pdf,application/pdf" hidden aria-hidden="true">
        </div>
        <div id="fileInfo" class="file-info hidden" aria-live="polite"></div>
      </section>

      <!-- Step 2: View PDF & Place Signature -->
      <section id="step-viewer" class="step hidden">
        <div class="viewer-toolbar">
          <button id="btnBack" class="btn-icon" aria-label="Kembali ke upload" title="Ganti PDF">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <polyline points="15 18 9 12 15 6"/>
            </svg>
          </button>
          <div class="toolbar-separator"></div>
          <button id="btnPrevPage" class="btn-icon" aria-label="Halaman sebelumnya" disabled>
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <polyline points="15 18 9 12 15 6"/>
            </svg>
          </button>
          <span id="pageInfo" class="page-info">1 / 1</span>
          <button id="btnNextPage" class="btn-icon" aria-label="Halaman berikutnya" disabled>
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <polyline points="9 18 15 12 9 6"/>
            </svg>
          </button>
          <div class="toolbar-separator"></div>
          <button id="btnZoomOut" class="btn-icon" aria-label="Perkecil">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
              <line x1="8" y1="11" x2="14" y2="11"/>
            </svg>
          </button>
          <button id="btnZoomIn" class="btn-icon" aria-label="Perbesar">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
              <line x1="11" y1="8" x2="11" y2="14"/><line x1="8" y1="11" x2="14" y2="11"/>
            </svg>
          </button>
          <div class="toolbar-separator"></div>
          <button id="btnClearAll" class="btn-icon" aria-label="Hapus semua tanda tangan" title="Hapus semua">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/>
            </svg>
          </button>
        </div>
        <div class="pdf-container" id="pdfContainer">
          <div class="pdf-canvas-wrapper" id="pdfCanvasWrapper">
            <canvas id="pdfCanvas"></canvas>
            <div id="signatureOverlay" class="signature-overlay hidden"></div>
          </div>
        </div>
        <div class="viewer-actions">
          <button id="btnAddSignature" class="btn btn-primary">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M12 20h9"/><path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z"/>
            </svg>
            Tambah Tanda Tangan
          </button>
          <button id="btnAddDate" class="btn btn-outline">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/>
            </svg>
            Tambah Tanggal
          </button>
          <button id="btnDownload" class="btn btn-success hidden">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
              <polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/>
            </svg>
            Download PDF
          </button>
        </div>
      </section>

      <!-- Signature Modal -->
      <div id="signatureModal" class="modal hidden" role="dialog" aria-modal="true" aria-label="Buat tanda tangan">
        <div class="modal-backdrop"></div>
        <div class="modal-content">
          <div class="modal-header">
            <h2>Buat Tanda Tangan</h2>
            <button id="btnCloseModal" class="btn-icon btn-close" aria-label="Tutup">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
              </svg>
            </button>
          </div>
          <div class="modal-body">
            <div class="signature-tabs">
              <button class="tab-btn active" data-tab="draw">Gambar</button>
              <button class="tab-btn" data-tab="type">Ketik</button>
            </div>
            <div id="tabDraw" class="tab-content active">
              <canvas id="signatureCanvas" class="signature-canvas"></canvas>
              <div class="signature-tools">
                <label class="color-picker-label">
                  Warna:
                  <input type="color" id="penColor" value="#000000" class="color-picker">
                </label>
                <label class="size-picker-label">
                  Ukuran:
                  <input type="range" id="penSize" min="1" max="8" value="3" class="size-picker">
                </label>
                <button id="btnClearSignature" class="btn btn-outline btn-sm">Hapus</button>
              </div>
            </div>
            <div id="tabType" class="tab-content hidden">
              <input type="text" id="signatureText" class="signature-text-input" 
                     placeholder="Ketik nama Anda" maxlength="50" autocomplete="off">
              <div class="font-options">
                <button class="font-btn active" data-font="cursive" style="font-family: 'Brush Script MT', cursive">Cursive</button>
                <button class="font-btn" data-font="serif" style="font-family: Georgia, serif; font-style: italic">Serif</button>
                <button class="font-btn" data-font="sans" style="font-family: Arial, sans-serif">Sans</button>
              </div>
              <div id="signaturePreview" class="signature-preview"></div>
            </div>
          </div>
          <div class="modal-footer">
            <button id="btnCancelSignature" class="btn btn-outline">Batal</button>
            <button id="btnApplySignature" class="btn btn-primary">Terapkan</button>
          </div>
        </div>
      </div>
    </main>

    <!-- Toast Notifications -->
    <div id="toastContainer" class="toast-container" aria-live="assertive"></div>

    <!-- Footer -->
    <footer class="app-footer">
      <p>&copy; 2026 Farzani Ryuga B.A. All rights reserved.</p>
    </footer>
  </div>

  <script type="module" src="/src/js/app.js"></script>
</body>
</html>
